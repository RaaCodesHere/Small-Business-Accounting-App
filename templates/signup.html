{% extends "base.html" %}

{% block title %}Sign Up - HisabFlow{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <h1>✍️ Create Account</h1>
        
        <form method="POST" action="{{ url_for('signup') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Choose a username (min 3 characters)">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password (min 6 characters)">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm your password">
            </div>

            <div class="form-group">
                <button type="submit" class="btn-primary" style="width: 100%;">Sign Up</button>
            </div>
        </form>

        <div class="form-footer">
            <p>Already have an account?</p>
            <a href="{{ url_for('login') }}">Login here</a>
        </div>
    </div>
</div>
{% endblock %}
