{% extends "base.html" %}

{% block title %}Add Customer - HisabFlow{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <h1>➕ Add New Customer</h1>
        
        <form method="POST" action="{{ url_for('add_customer') }}">
            <div class="form-group">
                <label for="name">Customer Name *</label>
                <input type="text" id="name" name="name" required placeholder="Enter customer full name" minlength="2">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="tel" id="phone" name="phone" required placeholder="Enter phone number">
            </div>

            <div class="form-group">
                <label for="starting_balance">Starting Balance (Rs.)</label>
                <input type="number" id="starting_balance" name="starting_balance" value="0" step="0.01" placeholder="Enter starting balance (default: 0)">
            </div>

            <div class="form-group">
                <button type="submit" class="btn-primary" style="width: 100%;">Create Customer</button>
            </div>
        </form>

        <div class="form-footer">
            <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
